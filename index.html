<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Social Link Binsa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container py-5">
  <div class="card bg-secondary shadow-lg">
    <div class="card-body">
      <h3 class="mb-3">🚀 Social Link Binsa</h3>

      <textarea id="links" class="form-control mb-3" rows="8"
        placeholder="Paste banyak link disini..."></textarea>

      <button onclick="submitLinks()" class="btn btn-primary w-100">
        Proses Sekarang
      </button>

      <div id="result" class="mt-4"></div>
    </div>
  </div>
</div>

<script>
async function submitLinks() {
  const raw = document.getElementById('links').value;

  const links = raw
    .split('\n')
    .map(x => x.trim())
    .filter(x => x);

  const res = await fetch('https://script.google.com/macros/s/AKfycbz54UVidECtgHWkgKFP8jqRMEFS0RyCqbVg0SEo65uC_0zdKWscNn2spknASiCiRfPM/exec', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ links })
  });

  const data = await res.json();

  document.getElementById('result').innerHTML = `
    <div class="alert alert-info">
      ✅ Inserted: ${data.inserted}<br>
      ⚠️ Duplicate: ${data.duplicates}<br>
      ❌ Skipped: ${data.skipped}
    </div>
  `;
}
</script>

</body>
</html>
