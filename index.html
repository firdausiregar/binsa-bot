<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Social Link Binsa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container py-5">
  <div class="card bg-secondary shadow-lg">
    <div class="card-body">
      <h3 class="mb-3">🚀 Social Link Binsa</h3>

      <textarea id="links" class="form-control mb-3" rows="8"
        placeholder="Paste banyak link disini..."></textarea>

      <button id="btnSubmit" onclick="submitLinks()" class="btn btn-primary w-100">
        Proses Sekarang
      </button>

      <div id="result" class="mt-4"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="loadingModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-light">
      <div class="modal-body text-center">
        <div class="spinner-border text-primary mb-3"></div>
        <h5 id="loadingText">Memproses...</h5>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function submitLinks() {
  const textarea = document.getElementById('links');
  const button = document.getElementById('btnSubmit');
  const raw = textarea.value;

  let links = raw
    .split('\n')
    .map(x => x.trim())
    .filter(x => x);

  if (links.length === 0) return;

  button.disabled = true;

  const modal = new bootstrap.Modal(document.getElementById('loadingModal'));
  modal.show();

  const loadingText = document.getElementById('loadingText');

  // animasi hapus satu per satu
  for (let i = 0; i < links.length; i++) {
    loadingText.innerText = `Memproses ${i + 1} / ${links.length}`;
    textarea.value = links.slice(i + 1).join('\n');
    await new Promise(r => setTimeout(r, 80));
  }

  try {
    const res = await fetch('https://script.google.com/macros/s/AKfycbz54UVidECtgHWkgKFP8jqRMEFS0RyCqbVg0SEo65uC_0zdKWscNn2spknASiCiRfPM/exec', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ links })
    });

    // ambil text dulu (AMAN)
    const text = await res.text();

    let data;

    try {
      data = JSON.parse(text);
    } catch {
      throw new Error("jangan kosong");
    }

    document.getElementById('result').innerHTML = `
      <div class="alert alert-info">
        ✅ Inserted: ${data.inserted || 0}<br>
        ⚠️ Duplicate: ${data.duplicates || 0}<br>
        ❌ Skipped: ${data.skipped || 0}
      </div>
    `;

  } catch (err) {
    document.getElementById('result').innerHTML = `
      <div class="alert alert-warning">
        ⚠️ Data terkirim keserver<br>
        <small>${err.message}</small>
      </div>
    `;
  }

  modal.hide();
  button.disabled = false;
}
</script>

</body>
</html>
